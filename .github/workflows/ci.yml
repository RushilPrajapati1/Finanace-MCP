name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: finledger
          POSTGRES_PASSWORD: finledger
          POSTGRES_DB: finledger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finledger"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      FINLEDGER_DATABASE_URL: postgresql+asyncpg://finledger:finledger@localhost:5432/finledger
      FINLEDGER_TEST_DATABASE_URL: postgresql+asyncpg://finledger:finledger@localhost:5432/finledger_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check app tests

      - name: Create test database
        run: PGPASSWORD=finledger psql -h localhost -U finledger -d finledger -c "CREATE DATABASE finledger_test;"

      - name: Validate migrations (upgrade + downgrade)
        run: |
          alembic upgrade head
          alembic downgrade base

      - name: Run tests
        run: pytest -q
